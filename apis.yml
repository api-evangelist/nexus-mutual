name: Nexus Mutual
description: 'Nexus Mutual is a decentralized insurance protocol built on Ethereum
  that enables members to share risk through a discretionary mutual structure. Since
  2019 it has provided over 10,000 covers protecting more than $6 billion in crypto
  assets against smart contract hacks, custody failure, slashing events, depeg occurrences,
  and bespoke protocol risks. The public Cover Router REST API exposes endpoints for
  querying quote pricing, per-product and per-pool capacity, and the full product
  catalogue, enabling third-party frontends and integrators to build point-of-sale
  cover purchase flows on top of the Nexus Mutual protocol.

  '
image: https://nexusmutual.io/favicon.ico
url: https://nexusmutual.io
baseURL: https://api.nexusmutual.io
tags:
- Decentralized Insurance
- DeFi
- Ethereum
- Smart Contract Cover
